

<!DOCTYPE html>
<html>
<head>

<title>విరాళాల చరిత్ర</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
}

#bgvideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.container{
width:95%;
max-width:900px;
margin:auto;
margin-top:80px;
background:rgba(0,0,0,0.8);
padding:20px;
border-radius:10px;
}

input{
padding:10px;
width:250px;
margin:10px;
border-radius:6px;
border:none;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#ff9800;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:6px 12px;
border:none;
background:red;
color:white;
border-radius:4px;
cursor:pointer;
}

.total{
font-size:20px;
margin:15px;
font-weight:bold;
}

</style>
</head>

<body>

<video autoplay muted loop playsinline id="bgvideo">
<source src="https://v.ftcdn.net/03/42/22/21/240_F_342222167_pBjSKWaobtpcsSzYnlu0MLpZEU5SChAr_ST.mp4" type="video/mp4">
</video>
<audio id="bellSound" autoplay>
<source src="https://www.soundsnap.com/worship_indian_religious_temple_bell26_m_wav" type="audio/mpeg">
</audio>

<div class="container">

<h2>🛕 విరాళాల చరిత్ర</h2>

<input type="text" id="search" placeholder="పేరు లేదా రసీదు సంఖ్య వెతకండి">

<div class="total">
మొత్తం విరాళం: ₹ <span id="total"></span>
</div>

<table>

<tr>
<th>రసీదు</th>
<th>పేరు</th>
<th>మొత్తం</th>
<th>తేదీ</th>
<th>తొలగించు</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

<script>

let history=JSON.parse(localStorage.getItem("donations"))||[];

function load(data){

let table=document.getElementById("table");

table.innerHTML="";

let total=0;

data.forEach((r,i)=>{

total+=parseInt(r.amount);

table.innerHTML+=`
<tr>
<td>${r.receipt}</td>
<td>${r.name}</td>
<td>₹${r.amount}</td>
<td>${r.date}</td>
<td><button onclick="del(${i})">Delete</button></td>
</tr>
`;

});

document.getElementById("total").textContent=total;

}

load(history);

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let filtered=history.filter(r=>

r.receipt.toString().includes(value) ||
r.name.toLowerCase().includes(value)

);

load(filtered);

});

function del(i){

history.splice(i,1);

localStorage.setItem("donations",JSON.stringify(history));

location.reload();

}
window.onload=function(){

let bell=new Audio("https://www.soundsnap.com/worship_indian_religious_temple_bell26_m_wav");

bell.play();

}


</script>

</body>
</html>
